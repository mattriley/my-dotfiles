name: CI

on:
  push:
  pull_request:

jobs:
  shell:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck zsh

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Lint shell scripts
        run: shellcheck refresh apply_profile capture_profile smoke_test src/bash/modules/**/*.sh profiles/default/link/.bash_profile profiles/default/link/.bashrc

      - name: Validate shell syntax
        run: |
          bash -n refresh apply_profile capture_profile smoke_test src/bash/modules/**/*.sh profiles/default/link/.bash_profile profiles/default/link/.bashrc
          zsh -n profiles/default/link/.zshrc

      - name: Run smoke test
        run: bash --noprofile --norc ./smoke_test
