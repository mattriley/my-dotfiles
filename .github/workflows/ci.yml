name: CI

on:
  push:
  pull_request:

jobs:
  shell:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck zsh

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Lint shell scripts
        run: shellcheck refresh install_shell_profile pull_shell_profile smoke_test src/bash/modules/**/*.sh src/bash/profiles/default/.bash_profile src/bash/profiles/default/.bashrc

      - name: Validate shell syntax
        run: |
          bash -n refresh install_shell_profile pull_shell_profile smoke_test src/bash/modules/**/*.sh src/bash/profiles/default/.bash_profile src/bash/profiles/default/.bashrc
          zsh -n src/bash/profiles/default/.zshrc

      - name: Run smoke test
        run: bash --noprofile --norc ./smoke_test
